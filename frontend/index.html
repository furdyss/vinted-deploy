<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.json">
<title>Vinted Panel</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<button class="hamburger" onclick="toggleSidebar()">☰</button>

<aside class="sidebar" id="sidebar">
<div class="sidebar-header">
<h1>💎 Vinted Panel</h1>
<p>Market Intelligence</p>
</div>
<nav class="nav">
<div class="nav-item active" onclick="showPage('dashboard')">
<span class="icon">📊</span> Dashboard
</div>
<div class="nav-item" onclick="showPage('items')">
<span class="icon">📦</span> Przedmioty
</div>
<div class="nav-item" onclick="showPage('queries')">
<span class="icon">🔍</span> Wyszukiwania
</div>
<div class="nav-item" onclick="showPage('analysis')">
<span class="icon">📈</span> Analiza
</div>
</nav>
</aside>

<main class="main">

<div class="page active" id="page-dashboard">
<div class="page-header"><h2>Dashboard</h2></div>
<div class="stats-grid" id="stats-grid"></div>
<div class="chart-container">
<h3>📈 Trend cenowy (30 dni)</h3>
<canvas class="chart-canvas" id="trend-chart"></canvas>
</div>
<h3 style="margin-bottom:16px;color:var(--t2);font-size:13px;text-transform:uppercase;letter-spacing:1px;font-weight:600">🏷️ Top Marki</h3>
<div id="brand-bars" class="brand-bars"></div>
</div>

<div class="page" id="page-items">
<div class="page-header"><h2>Przedmioty</h2></div>
<div class="search-bar">
<input class="search-input" id="item-search" placeholder="🔎 Szukaj przedmiotów..." oninput="debounceSearch()">
<select class="search-input" style="max-width:180px" id="item-sort" onchange="loadItems()">
<option value="newest">🕐 Najnowsze</option>
<option value="price_asc">💰 Cena ↑</option>
<option value="price_desc">💎 Cena ↓</option>
</select>
</div>
<div class="items-grid" id="items-grid"></div>
<div style="text-align:center;margin-top:24px">
<button class="btn btn-secondary" id="load-more-btn" onclick="loadMore()" style="display:none">Pokaż więcej</button>
</div>
</div>

<div class="page" id="page-queries">
<div class="page-header">
<h2>Wyszukiwania</h2>
<button class="btn btn-primary" onclick="showAddQueryModal()">✨ Nowe</button>
</div>
<div class="table-wrap">
<table>
<thead><tr><th>Nazwa</th><th>URL</th><th>Status</th><th>Co ile</th><th>Kiedy</th><th></th></tr></thead>
<tbody id="queries-table"></tbody>
</table>
</div>
</div>

<div class="page" id="page-analysis">
<div class="page-header"><h2>Analiza Marek</h2></div>
<div class="table-wrap">
<table>
<thead><tr><th>Marka</th><th>Ilość</th><th>Śr.</th><th>Min</th><th>Max</th></tr></thead>
<tbody id="brand-table"></tbody>
</table>
</div>
</div>

</main>

<div class="modal-overlay" id="add-query-modal">
<div class="modal">
<h3>✨ Nowe wyszukiwanie</h3>
<div class="form-group"><label>Nazwa</label><input id="q-name" placeholder="np. Nike Air Force"></div>
<div class="form-group"><label>URL Vinted</label><input id="q-url" placeholder="https://www.vinted.pl/catalog?search_text=nike"></div>
<div class="form-group"><label>Interwał (min)</label><input id="q-interval" type="number" value="30" min="5"></div>
<div class="modal-actions">
<button class="btn btn-secondary" onclick="closeModal()">Anuluj</button>
<button class="btn btn-primary" onclick="addQuery()">Dodaj</button>
</div>
</div>
</div>

<div class="toast" id="toast"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
